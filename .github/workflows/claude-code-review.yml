name: Claude Code Review

on:
  pull_request_review_comment:
    types: [created]

jobs:
  claude-review:
    if: github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Bash(git diff*),Bash(git log*),Bash(git show*),Read"'
          prompt: |
            あなたはArduino C++ファームウェアプロジェクト（Ducati 900SSクイックシフター）のプルリクエストをレビューします。
            コメントはすべて日本語で記述してください。

            まず変更ファイルと差分を取得してください：
            - 実行: git diff origin/${{ github.base_ref }}...HEAD --name-only
            - 実行: git diff origin/${{ github.base_ref }}...HEAD

            以下の観点でレビューしてください：
            - C++およびArduino固有コードの正確性（ISR安全性、volatileの使用、millis()によるタイミング制御）
            - 安全性：このファームウェアはバイクの点火カットを制御するため、バグはエンジン損傷につながる
            - プロジェクトの不変条件の遵守（delay()禁止、volatile変数はsensor.cppに限定、等）
            - ギア推定・点火カットタイミング計算のロジックエラー
            - docs/配下のドキュメントとの整合性

            **レビュー結果はPRレビューコメントとして日本語で投稿してください。インラインコメントは使用しないでください。**
